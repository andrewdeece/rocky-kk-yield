name: ROCKY SOTA CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: rocky-artemis
        environment-file: environment.yml
        auto-activate-base: false
        conda-solver: libmamba

    - name: Cache Conda Packages
      uses: actions/cache@v4
      env:
        cache-name: cache-conda-pkgs
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ hashFiles('environment.yml') }}

    - name: Verify Environment
      run: |
        conda info
        conda list

    - name: Enforce Code Quality (Ruff)
      run: |
        mkdir -p src tests
        ruff check src/ tests/
        ruff format --check src/ tests/

    - name: Execute Physics Engine Unit Tests
      run: |
        PYTHONPATH=src pytest tests/ --cov=src --cov-report=xml --cov-report=term

    - name: Upload Coverage Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 14
